apiVersion: v1
data:
    key1: value1
    key2: value2
kind: ConfigMap
metadata:
    annotations:
        origin.datadoghq.com/location: '{"repo":{"url":"https://github.com/myorg/myrepo","targetRevision":"abc123"}}'
    name: my-config
    namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
    annotations:
        origin.datadoghq.com/location: '{"repo":{"url":"https://github.com/myorg/myrepo","targetRevision":"abc123"}}'
    name: my-app
    namespace: default
spec:
    replicas: 1
    selector:
        matchLabels:
            app: my-app
    template:
        metadata:
            labels:
                app: my-app
        spec:
            containers:
                - image: nginx:latest
                  name: my-app
