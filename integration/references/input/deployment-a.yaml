apiVersion: apps/v1
kind: Deployment
metadata:
    name: test-app
    labels:
        app: test-app
        app.kubernetes.io/instance: test-release
    annotations:
        datadoghq.com/test-annotations: "helm-test"
spec:
    replicas: 2
    selector:
        matchLabels:
            app: test-app
    template:
        metadata:
            labels:
                app: test-app
        spec:
            containers:
                - image: nginx:1.21
                  imagePullPolicy: IfNotPresent
                  name: test-app
                  ports:
                    - containerPort: 80
                      name: http
                      protocol: TCP
