apiVersion: v1
type: cli/v1
name: datadog
version: 0.1.2
runtime: subprocess
sourceURL: https://github.com/DataDog/helm-plugin
config:
  ignoreFlags: false
  usage: datadog
  shortHelp: helm-datadog is a helm plugin to alter rendered charts, add location annotations to all resource manifests.
  longHelp: |
    helm-datadog is a helm plugin to alter rendered charts, add location annotations to all resource manifests.

    For more information, see the README.md at https://github.com/datadog/helm-plugin

    Example:
      $ helm datadog [<PLUGIN OPTIONS>] install <HELM INTALL OPTIONS>
      $ helm datadog [<PLUGIN OPTIONS>] upgrade <HELM UPGRADE OPTIONS>
      $ helm datadog [<PLUGIN OPTIONS>] template <HELM template OPTIONS>

    Available Commands:
      <cmd>   wrapper runs helm <cmd> and post-renderer to add annotations

    Available Options:
      --help                                           -h  Show help
      --version                                        -v  Display version of helm-datadog

runtimeConfig:
  platformCommand: # Configure command to run based on the platform
    - os: linux
      command: "$HELM_PLUGIN_DIR/scripts/main.sh"
    - os: darwin
      command: "$HELM_PLUGIN_DIR/scripts/main.sh"
